name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: devops-demo
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Setup Node
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # 3. Install Dependencies
    - name: Install Dependencies
      run: |
        cd app
        npm install

    # 4. Lint
    - name: Lint Code
      run: |
        cd app
        npm run lint

    # 5. Run Tests
    - name: Run Tests
      run: |
        cd app
        npm test

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
    # 6. Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 7. Login to Docker Hub
    - name: Login to Docker Hub
      run: echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

    # 8. Build Docker Image
    - name: Build Image
      run: |
        docker build -t $DOCKER_USERNAME/$IMAGE_NAME:${{ github.sha }} -f docker/Dockerfile .

    # 9. Scan Image (Security)
    - name: Scan Image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # 10. Push Image
    - name: Push Image
      run: |
        docker push $DOCKER_USERNAME/$IMAGE_NAME:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
    # 11. Deploy (Simple EC2/VM Example)
    - name: Deploy to Server
      run: |
        echo "Simulating deployment..."
        docker run -d -p 80:3000 $DOCKER_USERNAME/$IMAGE_NAME:${{ github.sha }}